version: "3.8"

services:
  rag-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DOCS_PATH=/data/input.jsonl
      - FAISS_INDEX_PATH=/data/faiss_index
    volumes:
      - ./data/input.jsonl:/data/input.jsonl:ro
      - ./data:/data
    restart: unless-stopped